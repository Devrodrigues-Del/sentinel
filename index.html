<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CDL Aracaju — Votação 2025</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0d2247;
    --gold: #c8972a;
    --light-gold: #e8b84b;
    --bg: #f0ece4;
    --card-bg: #faf8f4;
    --text-muted: #8a8a9a;
    --border: #ddd8ce;
    --blue-accent: #1a4fa0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Montserrat', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    color: var(--navy);
  }

  /* Header */
  header {
    background: #fff;
    border-bottom: 1px solid var(--border);
    padding: 18px 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 52px;
    height: 40px;
  }

  .logo-text {
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    font-size: 1.4rem;
    color: var(--navy);
    line-height: 1;
  }

  .logo-sub {
    font-size: 0.75rem;
    font-weight: 400;
    color: var(--blue-accent);
    letter-spacing: 0.05em;
  }

  .edition-badge {
    font-family: 'Montserrat', sans-serif;
    font-weight: 600;
    font-size: 0.75rem;
    letter-spacing: 0.25em;
    color: var(--gold);
    text-transform: uppercase;
  }

  /* Main Content */
  main {
    max-width: 820px;
    margin: 0 auto;
    padding: 64px 24px 80px;
  }

  .category-label {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.3em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .category-label::before {
    content: '';
    display: inline-block;
    width: 28px;
    height: 2px;
    background: var(--gold);
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: clamp(2rem, 5vw, 3rem);
    color: var(--navy);
    margin-bottom: 48px;
    line-height: 1.1;
  }

  /* Candidates */
  .candidates {
    display: flex;
    flex-direction: column;
    gap: 0;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(13,34,71,0.07);
  }

  .candidate {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 26px 32px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.2s ease;
    position: relative;
    overflow: hidden;
  }

  .candidate:last-child { border-bottom: none; }

  .candidate::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(200,151,42,0.04));
    opacity: 0;
    transition: opacity 0.3s;
  }

  .candidate:hover { background: #f5f1e8; }
  .candidate:hover::after { opacity: 1; }

  .candidate.selected {
    background: linear-gradient(90deg, rgba(200,151,42,0.08), rgba(200,151,42,0.03));
  }

  .radio-wrap {
    flex-shrink: 0;
  }

  .radio-btn {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 2px solid #c0bdb6;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.2s, background 0.2s;
    background: #fff;
  }

  .candidate.selected .radio-btn {
    border-color: var(--gold);
    background: var(--gold);
  }

  .radio-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #fff;
    opacity: 0;
    transform: scale(0);
    transition: opacity 0.2s, transform 0.2s;
  }

  .candidate.selected .radio-dot {
    opacity: 1;
    transform: scale(1);
  }

  .candidate-name {
    flex: 1;
    font-size: 0.9rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--navy);
  }

  .vote-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-muted);
    transition: color 0.2s;
  }

  .candidate:hover .vote-btn,
  .candidate.selected .vote-btn {
    color: var(--gold);
  }

  .vote-btn svg {
    width: 16px;
    height: 16px;
    stroke: currentColor;
    transition: transform 0.2s;
  }

  .candidate:hover .vote-btn svg {
    transform: translateX(3px);
  }

  /* Submit */
  .submit-area {
    margin-top: 40px;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 16px;
  }

  .submit-btn {
    padding: 16px 48px;
    background: var(--navy);
    color: #fff;
    border: none;
    border-radius: 6px;
    font-family: 'Montserrat', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
    opacity: 0.4;
    pointer-events: none;
  }

  .submit-btn.active {
    opacity: 1;
    pointer-events: all;
    background: var(--gold);
  }

  .submit-btn.active:hover {
    background: var(--light-gold);
    transform: translateY(-1px);
  }

  .hint {
    font-size: 0.72rem;
    color: var(--text-muted);
    letter-spacing: 0.05em;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--navy);
    color: #fff;
    padding: 14px 32px;
    border-radius: 8px;
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
    white-space: nowrap;
    z-index: 100;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Decorative bar */
  .deco-bar {
    width: 100%;
    height: 4px;
    background: linear-gradient(90deg, var(--navy), var(--blue-accent), var(--gold));
    margin-bottom: 0;
  }

  @media (max-width: 600px) {
    header { padding: 14px 20px; }
    main { padding: 40px 16px 60px; }
    .candidate { padding: 20px 20px; }
  }
</style>
</head>
<body>

<div class="deco-bar"></div>

<header>
  <div class="logo">
    <svg class="logo-icon" viewBox="0 0 52 40" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="52" height="40" rx="4" fill="#1a4fa0"/>
      <polygon points="4,36 26,4 48,36" fill="#fff" opacity="0.15"/>
      <polygon points="4,36 18,12 32,36" fill="#2ecc71" opacity="0.85"/>
      <polygon points="22,36 36,12 50,36" fill="#f0c040" opacity="0.85"/>
    </svg>
    <div>
      <div class="logo-text">CDL</div>
      <div class="logo-sub">Aracaju</div>
    </div>
  </div>
  <div class="edition-badge">Edição 2025</div>
</header>

<main>
  <div class="category-label">09 Subcategorias</div>
  <h1>Puxa Saco do Ano</h1>

  <div class="candidates" id="candidates">
    <div class="candidate" data-name="ANDERSON BRAZ" onclick="select(this)">
      <div class="radio-wrap">
        <div class="radio-btn"><div class="radio-dot"></div></div>
      </div>
      <span class="candidate-name">Anderson Braz</span>
      <span class="vote-btn">
        Votar
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </span>
    </div>

    <div class="candidate" data-name="PATRICK" onclick="select(this)">
      <div class="radio-wrap">
        <div class="radio-btn"><div class="radio-dot"></div></div>
      </div>
      <span class="candidate-name">Patrick</span>
      <span class="vote-btn">
        Votar
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </span>
    </div>

    <div class="candidate" data-name="LUCAS GOMES" onclick="select(this)">
      <div class="radio-wrap">
        <div class="radio-btn"><div class="radio-dot"></div></div>
      </div>
      <span class="candidate-name">Lucas Gomes</span>
      <span class="vote-btn">
        Votar
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </span>
    </div>
  </div>

  <div class="submit-area">
    <button class="submit-btn" id="submitBtn" onclick="submitVote()">Confirmar Voto</button>
    <span class="hint" id="hint">Selecione um candidato para votar</span>
  </div>
</main>

<div class="toast" id="toast">✓ Voto registrado com sucesso!</div>

<script>
  let selected = null;

  function select(el) {
    document.querySelectorAll('.candidate').forEach(c => c.classList.remove('selected'));
    el.classList.add('selected');
    selected = el.dataset.name;

    const btn = document.getElementById('submitBtn');
    btn.classList.add('active');

    document.getElementById('hint').textContent = `Candidato selecionado: ${el.querySelector('.candidate-name').textContent}`;
  }

  function submitVote() {
    if (!selected) return;
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
  }
</script>
</body>
</html>
